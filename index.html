<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>表情大挑战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .screen.hidden { display: none; }

  h1 { font-size: 32px; color: #ffd700; margin-bottom: 30px; text-align: center; }
  h2 { font-size: 24px; color: #ffd700; margin-bottom: 20px; text-align: center; }

  #start-screen .subtitle {
    color: #aaa;
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.8;
    padding: 0 30px;
  }
  .btn {
    padding: 15px 50px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ff88, #00d4ff);
    color: #1a1a2e;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
    margin: 10px;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
  .btn.secondary {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* 关卡选择 */
  #level-select { padding: 20px; }
  .level-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
    max-width: 400px;
    width: 100%;
  }
  .level-btn {
    aspect-ratio: 1;
    border-radius: 15px;
    border: 3px solid transparent;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .level-btn .level-num { font-size: 24px; }
  .level-btn .level-status { font-size: 12px; margin-top: 5px; }
  .level-btn.unlocked {
    background: rgba(0,255,136,0.2);
    border-color: #00ff88;
    color: #00ff88;
  }
  .level-btn.unlocked:hover { transform: scale(1.1); background: rgba(0,255,136,0.3); }
  .level-btn.locked {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.4);
    cursor: not-allowed;
  }
  .level-btn.cleared {
    background: rgba(255,215,0,0.2);
    border-color: #ffd700;
    color: #ffd700;
  }
  .level-btn.cleared:hover { transform: scale(1.1); background: rgba(255,215,0,0.3); }

  /* 游戏页面 */
  #game-screen {
    justify-content: flex-start;
    padding-top: 20px;
    overflow-y: auto;
  }
  #status-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
    padding: 12px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 10px;
  }
  #timer { font-size: 20px; font-weight: bold; }
  .warning { color: #ff4757 !important; animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  #target-emotion {
    font-size: 28px;
    font-weight: bold;
    color: #00ff88;
    text-align: center;
    padding: 15px;
    background: rgba(0,255,136,0.1);
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 10px;
  }
  #target-emotion .hint { font-size: 14px; color: #aaa; margin-top: 8px; }

  #video-container {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    margin-bottom: 15px;
  }
  #video { display: block; transform: scaleX(-1); }
  #canvas { position: absolute; top: 0; left: 0; }

  #similarity-display {
    text-align: center;
    margin-bottom: 15px;
  }
  #similarity-value {
    font-size: 56px;
    font-weight: bold;
    transition: color 0.2s;
  }
  #similarity-label { font-size: 14px; color: #aaa; }
  .similarity-low { color: #ff4757; }
  .similarity-mid { color: #ffd700; }
  .similarity-high { color: #00ff88; }

  /* 结果弹框 */
  #modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  #modal.hidden { display: none; }
  #modal-content {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 20px;
    padding: 30px 40px;
    text-align: center;
    max-width: 320px;
    width: 90%;
  }
  #modal-content h3 {
    font-size: 24px;
    margin-bottom: 10px;
  }
  #modal-content p { color: #aaa; margin-bottom: 25px; }
  #modal-content .btn-group { display: flex; flex-direction: column; gap: 10px; }

  /* 游戏规则 */
  .rules-intro {
    color: #aaa;
    text-align: center;
    margin-bottom: 25px;
    font-size: 16px;
  }

  /* 倒计时遮罩 */
  #countdown-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 150;
  }
  #countdown-overlay.hidden { display: none; }
  #countdown-number {
    font-size: 120px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
  }
  #countdown-text {
    font-size: 24px;
    color: #fff;
    margin-top: 10px;
  }

  .back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 20px;
    font-size: 14px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    z-index: 50;
  }

  #score-display { color: #ffd700; }

  /* 提示动画 */
  #action-tip {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 25px;
    background: rgba(0,255,136,0.2);
    border: 2px solid #00ff88;
    border-radius: 25px;
    font-size: 16px;
    color: #00ff88;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
  }
  #action-tip.show { opacity: 1; }
</style>
</head>
<body>

<!-- 加载中 -->
<div id="loading" class="hidden" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:18px;background:rgba(0,0,0,0.9);padding:25px 40px;border-radius:15px;z-index:300;color:#fff;text-align:center;"></div>

<!-- 开始页面 -->
<div id="start-screen" class="screen">
  <h1>表情大挑战</h1>
  <p class="subtitle">
    根据提示做出相应的表情<br>
    相似度达到90%即可过关<br>
    每关限时30秒<br>
    共7个关卡等你挑战
  </p>
  <button class="btn" id="start-btn">开始挑战</button>
  <button class="btn secondary" id="level-select-btn">选择关卡</button>
</div>

<!-- 关卡选择 -->
<div id="level-select" class="screen hidden">
  <button class="back-btn" id="back-from-levels">返回</button>
  <h2>选择关卡</h2>
  <p class="rules-intro">做出相应表情，相似度达到90%即可通关</p>
  <div class="level-grid" id="level-grid"></div>
</div>

<!-- 游戏页面 -->
<div id="game-screen" class="screen hidden">
  <button class="back-btn" id="back-btn">返回</button>

  <div id="status-bar">
    <span>关卡 <span id="level-num">1</span>/7</span>
    <span id="timer">30s</span>
    <span>总分: <span id="score-display">0</span></span>
  </div>

  <div id="target-emotion">
    <div id="emotion-text">平静</div>
    <div class="hint" id="emotion-hint">保持自然放松的表情</div>
  </div>

  <div id="video-container">
    <video id="video" width="320" height="320" autoplay playsinline></video>
    <canvas id="canvas" width="320" height="320"></canvas>
  </div>

  <div id="similarity-display">
    <div id="similarity-value" class="similarity-low">0%</div>
    <div id="similarity-label">与目标表情的相似度</div>
  </div>

  <div id="action-tip"></div>

  <!-- 倒计时遮罩 -->
  <div id="countdown-overlay">
    <div id="countdown-number">3</div>
    <div id="countdown-text">准备开始</div>
  </div>
</div>

<!-- 结果弹框 -->
<div id="modal" class="hidden">
  <div id="modal-content">
    <h3 id="modal-title">恭喜过关！</h3>
    <p id="modal-text">+150分</p>
    <div class="btn-group" id="modal-buttons"></div>
  </div>
</div>

<script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
// 表情关卡配置 - 使用 face-api.js 表情识别
const EMOTIONS = [
  { name: '平静', key: 'neutral', hint: '保持自然放松的表情' },
  { name: '开心', key: 'happy', hint: '露出自然的笑容' },
  { name: '惊讶', key: 'surprised', hint: '眉毛上扬，嘴巴张开' },
  { name: '悲伤', key: 'sad', hint: '嘴角向下，眉头微微皱起' },
  { name: '生气', key: 'angry', hint: '眉头下压，嘴唇抿紧' },
  { name: '害怕', key: 'fearful', hint: '眼睛睁大，眉毛上扬' },
  { name: '厌恶', key: 'disgusted', hint: '皱起鼻子，嘴角下拉' }
];

const PASS_THRESHOLD = 0.9;
const TIME_LIMIT = 30;
const STORAGE_KEY = 'emotion_game_progress_v2';

let gameState = {
  currentLevel: 0,
  totalScore: 0,
  levels: {}
};

let isPlaying = false;
let timer = TIME_LIMIT;
let timerInterval = null;
let video = null;
let canvas = null;
let ctx = null;

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      gameState.levels = parsed.levels || {};
      gameState.totalScore = parsed.totalScore || 0;
    }
  } catch (e) {}
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      levels: gameState.levels,
      totalScore: gameState.totalScore
    }));
  } catch (e) {}
}

function isLevelUnlocked(levelIndex) {
  if (levelIndex === 0) return true;
  return gameState.levels[levelIndex - 1]?.cleared === true;
}

function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  EMOTIONS.forEach((emotion, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    const unlocked = isLevelUnlocked(i);
    const cleared = gameState.levels[i]?.cleared;

    if (cleared) {
      btn.classList.add('cleared');
      btn.innerHTML = `<span class="level-num">${i + 1}</span><span class="level-status">已通过</span>`;
    } else if (unlocked) {
      btn.classList.add('unlocked');
      btn.innerHTML = `<span class="level-num">${i + 1}</span><span class="level-status">${emotion.name}</span>`;
    } else {
      btn.classList.add('locked');
      btn.innerHTML = `<span class="level-num">🔒</span><span class="level-status">未解锁</span>`;
    }

    if (unlocked) {
      btn.addEventListener('click', () => startLevel(i));
    }

    grid.appendChild(btn);
  });
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(screenId).classList.remove('hidden');
}

function showActionTip(text) {
  const tip = document.getElementById('action-tip');
  tip.textContent = text;
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 1500);
}

function startLevel(levelIndex) {
  gameState.currentLevel = levelIndex;
  timer = TIME_LIMIT;

  const emotion = EMOTIONS[levelIndex];

  document.getElementById('level-num').textContent = levelIndex + 1;
  document.getElementById('emotion-text').textContent = emotion.name;
  document.getElementById('emotion-hint').textContent = emotion.hint;
  document.getElementById('score-display').textContent = gameState.totalScore;
  document.getElementById('similarity-value').textContent = '0%';
  document.getElementById('similarity-value').className = 'similarity-low';
  document.getElementById('timer').textContent = TIME_LIMIT + 's';
  document.getElementById('timer').classList.remove('warning');

  showScreen('game-screen');

  // 3秒倒计时
  startCountdown(3, () => {
    isPlaying = true;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timer--;
      updateTimer();
      if (timer <= 0) {
        clearInterval(timerInterval);
        failLevel();
      }
    }, 1000);
  });
}

function startCountdown(seconds, callback) {
  const overlay = document.getElementById('countdown-overlay');
  const numberEl = document.getElementById('countdown-number');
  overlay.classList.remove('hidden');

  let count = seconds;
  numberEl.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      numberEl.textContent = count;
    } else {
      clearInterval(interval);
      overlay.classList.add('hidden');
      callback();
    }
  }, 1000);
}

function updateTimer() {
  const timerEl = document.getElementById('timer');
  timerEl.textContent = timer + 's';
  if (timer <= 5) {
    timerEl.classList.add('warning');
  } else {
    timerEl.classList.remove('warning');
  }
}

function passLevel() {
  isPlaying = false;
  clearInterval(timerInterval);

  const points = timer * 10;
  gameState.totalScore += points;
  gameState.levels[gameState.currentLevel] = {
    cleared: true,
    bestScore: Math.max(gameState.levels[gameState.currentLevel]?.bestScore || 0, points)
  };
  saveProgress();

  if (gameState.currentLevel === EMOTIONS.length - 1) {
    showGameComplete();
  } else {
    showModal({
      title: '🎉 恭喜过关！',
      text: `+${points}分，下一关：${EMOTIONS[gameState.currentLevel + 1].name}`,
      buttons: [
        { text: '下一关', action: () => { hideModal(); startLevel(gameState.currentLevel + 1); } }
      ]
    });
  }
}

function failLevel() {
  isPlaying = false;
  const currentSimilarity = parseInt(document.getElementById('similarity-value').textContent);

  showModal({
    title: '😢 时间到！',
    text: `相似度 ${currentSimilarity}%，未达到90%`,
    buttons: [
      { text: '重新挑战', action: () => { hideModal(); startLevel(gameState.currentLevel); }, primary: true },
      { text: '返回关卡', action: () => { hideModal(); showLevelSelect(); }, secondary: true }
    ]
  });
}

function showGameComplete() {
  showModal({
    title: '🏆 全部通关！',
    text: `总分：${gameState.totalScore}分`,
    buttons: [
      { text: '再玩一次', action: () => { hideModal(); showLevelSelect(); }, primary: true },
      { text: '返回首页', action: () => { hideModal(); showScreen('start-screen'); } }
    ]
  });
}

function showLevelSelect() {
  renderLevelGrid();
  showScreen('level-select');
}

function showModal({ title, text, buttons }) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;

  const btnGroup = document.getElementById('modal-buttons');
  btnGroup.innerHTML = '';

  buttons.forEach(btn => {
    const button = document.createElement('button');
    button.className = btn.primary ? 'btn' : 'btn secondary';
    button.textContent = btn.text;
    button.addEventListener('click', btn.action);
    btnGroup.appendChild(button);
  });

  document.getElementById('modal').classList.remove('hidden');
}

function hideModal() {
  document.getElementById('modal').classList.add('hidden');
}

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 320 }
    });
    video.srcObject = stream;
    await new Promise(resolve => video.onloadedmetadata = resolve);
    return true;
  } catch (err) {
    alert('无法访问摄像头，请确保已授权摄像头权限');
    return false;
  }
}

// 从本地加载模型
async function loadModels() {
  const loadingEl = document.getElementById('loading');
  if (!loadingEl) return;

  loadingEl.classList.remove('hidden');
  loadingEl.innerHTML = '<div style="font-size:16px;margin-bottom:15px;">正在加载模型...</div><div style="font-size:14px;color:#aaa;">首次加载后会被缓存</div>';

  try {
    // 从本地 weights 目录加载模型
    await faceapi.nets.tinyFaceDetector.loadFromUri('./weights/');
    await faceapi.nets.faceExpressionNet.loadFromUri('./weights/');
    loadingEl.classList.add('hidden');
    return true;
  } catch (err) {
    console.error('Model load error:', err);
    loadingEl.innerHTML = '<div style="color:#ff4757;">模型加载失败</div><div style="font-size:14px;color:#aaa;margin-top:10px;">请刷新重试</div>';
    return false;
  }
}

// 使用 face-api.js 进行表情检测
async function detectEmotion() {
  if (!video || !isPlaying) {
    requestAnimationFrame(detectEmotion);
    return;
  }

  try {
    const detections = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceExpressions();

    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (detections.length > 0) {
      const expressions = detections[0].expressions;
      const targetKey = EMOTIONS[gameState.currentLevel].key;
      const similarity = expressions[targetKey] || 0;

      const percent = Math.round(similarity * 100);
      const valueEl = document.getElementById('similarity-value');
      valueEl.textContent = percent + '%';

      if (percent >= 90) {
        valueEl.className = 'similarity-high';
      } else if (percent >= 70) {
        valueEl.className = 'similarity-mid';
      } else {
        valueEl.className = 'similarity-low';
      }

      if (similarity >= PASS_THRESHOLD) {
        passLevel();
      }
    } else {
      const valueEl = document.getElementById('similarity-value');
      valueEl.textContent = '未检测到人脸';
      valueEl.className = 'similarity-low';
    }
  } catch (e) {
    console.error('Detection error:', e);
  }

  requestAnimationFrame(detectEmotion);
}

// 事件绑定
document.getElementById('start-btn').addEventListener('click', async () => {
  if (video && video.srcObject) {
    showLevelSelect();
    return;
  }
  if (await initCamera()) {
    const loaded = await loadModels();
    if (loaded) {
      showLevelSelect();
      detectEmotion();
    }
  }
});

document.getElementById('level-select-btn').addEventListener('click', () => {
  renderLevelGrid();
  showScreen('level-select');
});

document.getElementById('back-btn').addEventListener('click', () => {
  if (isPlaying) {
    if (confirm('确定要退出当前关卡吗？')) {
      isPlaying = false;
      clearInterval(timerInterval);
      showLevelSelect();
    }
  } else {
    showLevelSelect();
  }
});

document.getElementById('back-from-levels').addEventListener('click', () => {
  showScreen('start-screen');
});

// 初始化
video = document.getElementById('video');
canvas = document.getElementById('canvas');
ctx = canvas.getContext('2d');

loadProgress();
renderLevelGrid();
</script>
</body>
</html>
