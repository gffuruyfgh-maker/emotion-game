<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>表情大挑战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .screen.hidden { display: none; }

  h1 { font-size: 32px; color: #ffd700; margin-bottom: 30px; text-align: center; }
  h2 { font-size: 24px; color: #ffd700; margin-bottom: 20px; text-align: center; }

  #start-screen .subtitle {
    color: #aaa;
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.8;
    padding: 0 30px;
  }
  .btn {
    padding: 15px 50px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ff88, #00d4ff);
    color: #1a1a2e;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
    margin: 10px;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
  .btn.secondary {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* 关卡选择 */
  #level-select { padding: 20px; }
  .level-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
    max-width: 400px;
    width: 100%;
  }
  .level-btn {
    aspect-ratio: 1;
    border-radius: 15px;
    border: 3px solid transparent;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .level-btn .level-num { font-size: 24px; }
  .level-btn .level-status { font-size: 12px; margin-top: 5px; }
  .level-btn.unlocked {
    background: rgba(0,255,136,0.2);
    border-color: #00ff88;
    color: #00ff88;
  }
  .level-btn.unlocked:hover { transform: scale(1.1); background: rgba(0,255,136,0.3); }
  .level-btn.locked {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.4);
    cursor: not-allowed;
  }
  .level-btn.cleared {
    background: rgba(255,215,0,0.2);
    border-color: #ffd700;
    color: #ffd700;
  }
  .level-btn.cleared:hover { transform: scale(1.1); background: rgba(255,215,0,0.3); }

  /* 游戏页面 */
  #game-screen {
    justify-content: flex-start;
    padding-top: 20px;
    overflow-y: auto;
  }
  #status-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
    padding: 12px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 10px;
  }
  #timer { font-size: 20px; font-weight: bold; }
  .warning { color: #ff4757 !important; animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  #target-emotion {
    font-size: 28px;
    font-weight: bold;
    color: #00ff88;
    text-align: center;
    padding: 15px;
    background: rgba(0,255,136,0.1);
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 10px;
  }
  #target-emotion .hint { font-size: 14px; color: #aaa; margin-top: 8px; }

  #video-container {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    margin-bottom: 15px;
  }
  #video { display: block; transform: scaleX(-1); }
  #canvas { position: absolute; top: 0; left: 0; }

  #similarity-display {
    text-align: center;
    margin-bottom: 15px;
  }
  #similarity-value {
    font-size: 56px;
    font-weight: bold;
    transition: color 0.2s;
  }
  #similarity-label { font-size: 14px; color: #aaa; }
  .similarity-low { color: #ff4757; }
  .similarity-mid { color: #ffd700; }
  .similarity-high { color: #00ff88; }

  /* 结果弹框 */
  #modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  #modal.hidden { display: none; }
  #modal-content {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 20px;
    padding: 30px 40px;
    text-align: center;
    max-width: 320px;
    width: 90%;
  }
  #modal-content h3 {
    font-size: 24px;
    margin-bottom: 10px;
  }
  #modal-content p { color: #aaa; margin-bottom: 25px; }
  #modal-content .btn-group { display: flex; flex-direction: column; gap: 10px; }

  /* 游戏规则 */
  .rules-intro {
    color: #aaa;
    text-align: center;
    margin-bottom: 25px;
    font-size: 16px;
  }

  /* 倒计时遮罩 */
  #countdown-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 150;
  }
  #countdown-overlay.hidden { display: none; }
  #countdown-number {
    font-size: 120px;
    font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
  }
  #countdown-text {
    font-size: 24px;
    color: #fff;
    margin-top: 10px;
  }

  .back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 20px;
    font-size: 14px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    z-index: 50;
  }

  #score-display { color: #ffd700; }

  /* 提示动画 */
  #action-tip {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 25px;
    background: rgba(0,255,136,0.2);
    border: 2px solid #00ff88;
    border-radius: 25px;
    font-size: 16px;
    color: #00ff88;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 50;
  }
  #action-tip.show { opacity: 1; }
</style>
</head>
<body>

<!-- 开始页面 -->
<div id="start-screen" class="screen">
  <h1>表情大挑战</h1>
  <p class="subtitle">
    根据提示做出相应的表情<br>
    相似度达到90%即可过关<br>
    每关限时30秒<br>
    共7个关卡等你挑战
  </p>
  <button class="btn" id="start-btn">开始挑战</button>
  <button class="btn secondary" id="level-select-btn">选择关卡</button>
</div>

<!-- 关卡选择 -->
<div id="level-select" class="screen hidden">
  <button class="back-btn" id="back-from-levels">返回</button>
  <h2>选择关卡</h2>
  <p class="rules-intro">做出相应表情，相似度达到90%即可通关</p>
  <div class="level-grid" id="level-grid"></div>
</div>

<!-- 游戏页面 -->
<div id="game-screen" class="screen hidden">
  <button class="back-btn" id="back-btn">返回</button>

  <div id="status-bar">
    <span>关卡 <span id="level-num">1</span>/7</span>
    <span id="timer">30s</span>
    <span>总分: <span id="score-display">0</span></span>
  </div>

  <div id="target-emotion">
    <div id="emotion-text">平静</div>
    <div class="hint" id="emotion-hint">保持自然放松的表情</div>
  </div>

  <div id="video-container">
    <video id="video" width="320" height="320" autoplay playsinline></video>
    <canvas id="canvas" width="320" height="320"></canvas>
  </div>

  <div id="similarity-display">
    <div id="similarity-value" class="similarity-low">0%</div>
    <div id="similarity-label">与目标表情的相似度</div>
  </div>

  <div id="action-tip"></div>

  <!-- 倒计时遮罩 -->
  <div id="countdown-overlay">
    <div id="countdown-number">3</div>
    <div id="countdown-text">准备开始</div>
  </div>
</div>

<!-- 结果弹框 -->
<div id="modal" class="hidden">
  <div id="modal-content">
    <h3 id="modal-title">恭喜过关！</h3>
    <p id="modal-text">+150分</p>
    <div class="btn-group" id="modal-buttons"></div>
  </div>
</div>

<script>
// 表情关卡配置 - 使用动作检测替代模型
const EMOTIONS = [
  { name: '平静', key: 'neutral', hint: '保持自然放松的表情', action: 'none' },
  { name: '微笑', key: 'smile', hint: '轻轻上扬嘴角', action: 'smile' },
  { name: '张嘴', key: 'open_mouth', hint: '张开嘴巴', action: 'open_mouth' },
  { name: '皱眉', key: 'frown', hint: '眉头皱在一起', action: 'frown' },
  { name: '闭眼', key: 'close_eyes', hint: '轻轻闭上眼睛', action: 'close_eyes' },
  { name: '惊讶', key: 'surprise', hint: '眉毛上扬，眼睛睁大', action: 'surprise' },
  { name: '生气', key: 'angry', hint: '皱眉瞪眼', action: 'angry' }
];

const PASS_THRESHOLD = 0.9;
const TIME_LIMIT = 30;
const STORAGE_KEY = 'emotion_game_progress_v2';

let gameState = {
  currentLevel: 0,
  totalScore: 0,
  levels: {}
};

let isPlaying = false;
let timer = TIME_LIMIT;
let timerInterval = null;
let video = null;
let canvas = null;
let ctx = null;
let animationId = null;

// 上一帧的数据用于比较
let lastFaceData = null;
let smileHistory = [];
let mouthHistory = [];
let browHistory = [];
let eyeHistory = [];

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      gameState.levels = parsed.levels || {};
      gameState.totalScore = parsed.totalScore || 0;
    }
  } catch (e) {}
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      levels: gameState.levels,
      totalScore: gameState.totalScore
    }));
  } catch (e) {}
}

function isLevelUnlocked(levelIndex) {
  if (levelIndex === 0) return true;
  return gameState.levels[levelIndex - 1]?.cleared === true;
}

function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  EMOTIONS.forEach((emotion, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    const unlocked = isLevelUnlocked(i);
    const cleared = gameState.levels[i]?.cleared;

    if (cleared) {
      btn.classList.add('cleared');
      btn.innerHTML = `<span class="level-num">${i + 1}</span><span class="level-status">已通过</span>`;
    } else if (unlocked) {
      btn.classList.add('unlocked');
      btn.innerHTML = `<span class="level-num">${i + 1}</span><span class="level-status">${emotion.name}</span>`;
    } else {
      btn.classList.add('locked');
      btn.innerHTML = `<span class="level-num">🔒</span><span class="level-status">未解锁</span>`;
    }

    if (unlocked) {
      btn.addEventListener('click', () => startLevel(i));
    }

    grid.appendChild(btn);
  });
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(screenId).classList.remove('hidden');
}

function showActionTip(text) {
  const tip = document.getElementById('action-tip');
  tip.textContent = text;
  tip.classList.add('show');
  setTimeout(() => tip.classList.remove('show'), 1500);
}

function startLevel(levelIndex) {
  gameState.currentLevel = levelIndex;
  timer = TIME_LIMIT;

  const emotion = EMOTIONS[levelIndex];

  document.getElementById('level-num').textContent = levelIndex + 1;
  document.getElementById('emotion-text').textContent = emotion.name;
  document.getElementById('emotion-hint').textContent = emotion.hint;
  document.getElementById('score-display').textContent = gameState.totalScore;
  document.getElementById('similarity-value').textContent = '0%';
  document.getElementById('similarity-value').className = 'similarity-low';
  document.getElementById('timer').textContent = TIME_LIMIT + 's';
  document.getElementById('timer').classList.remove('warning');

  showScreen('game-screen');

  // 3秒倒计时
  startCountdown(3, () => {
    isPlaying = true;
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
      timer--;
      updateTimer();
      if (timer <= 0) {
        clearInterval(timerInterval);
        failLevel();
      }
    }, 1000);
  });
}

function startCountdown(seconds, callback) {
  const overlay = document.getElementById('countdown-overlay');
  const numberEl = document.getElementById('countdown-number');
  overlay.classList.remove('hidden');

  let count = seconds;
  numberEl.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      numberEl.textContent = count;
    } else {
      clearInterval(interval);
      overlay.classList.add('hidden');
      callback();
    }
  }, 1000);
}

function updateTimer() {
  const timerEl = document.getElementById('timer');
  timerEl.textContent = timer + 's';
  if (timer <= 5) {
    timerEl.classList.add('warning');
  } else {
    timerEl.classList.remove('warning');
  }
}

function passLevel() {
  isPlaying = false;
  clearInterval(timerInterval);

  const points = timer * 10;
  gameState.totalScore += points;
  gameState.levels[gameState.currentLevel] = {
    cleared: true,
    bestScore: Math.max(gameState.levels[gameState.currentLevel]?.bestScore || 0, points)
  };
  saveProgress();

  if (gameState.currentLevel === EMOTIONS.length - 1) {
    showGameComplete();
  } else {
    showModal({
      title: '🎉 恭喜过关！',
      text: `+${points}分，下一关：${EMOTIONS[gameState.currentLevel + 1].name}`,
      buttons: [
        { text: '下一关', action: () => { hideModal(); startLevel(gameState.currentLevel + 1); } }
      ]
    });
  }
}

function failLevel() {
  isPlaying = false;
  const currentSimilarity = parseInt(document.getElementById('similarity-value').textContent);

  showModal({
    title: '😢 时间到！',
    text: `相似度 ${currentSimilarity}%，未达到90%`,
    buttons: [
      { text: '重新挑战', action: () => { hideModal(); startLevel(gameState.currentLevel); }, primary: true },
      { text: '返回关卡', action: () => { hideModal(); showLevelSelect(); }, secondary: true }
    ]
  });
}

function showGameComplete() {
  showModal({
    title: '🏆 全部通关！',
    text: `总分：${gameState.totalScore}分`,
    buttons: [
      { text: '再玩一次', action: () => { hideModal(); showLevelSelect(); }, primary: true },
      { text: '返回首页', action: () => { hideModal(); showScreen('start-screen'); } }
    ]
  });
}

function showLevelSelect() {
  renderLevelGrid();
  showScreen('level-select');
}

function showModal({ title, text, buttons }) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;

  const btnGroup = document.getElementById('modal-buttons');
  btnGroup.innerHTML = '';

  buttons.forEach(btn => {
    const button = document.createElement('button');
    button.className = btn.primary ? 'btn' : 'btn secondary';
    button.textContent = btn.text;
    button.addEventListener('click', btn.action);
    btnGroup.appendChild(button);
  });

  document.getElementById('modal').classList.remove('hidden');
}

function hideModal() {
  document.getElementById('modal').classList.add('hidden');
}

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 320 }
    });
    video.srcObject = stream;
    await new Promise(resolve => video.onloadedmetadata = resolve);
    return true;
  } catch (err) {
    alert('无法访问摄像头，请确保已授权摄像头权限');
    return false;
  }
}

// 简单的肤色检测 - 检查像素是否接近肤色
function isSkinTone(r, g, b) {
  // 简化的肤色判断
  const isLight = r > 95 && g > 40 && b > 20;
  const isSkin = Math.max(r, g, b) - Math.min(r, g, b) > 15;
  const isFaceRegion = !(r > 200 && g > 200 && b > 200); // 排除过亮的区域
  return isLight && isSkin && isFaceRegion;
}

// 检测嘴巴区域
function detectMouthRegion(imageData, faceY, faceH) {
  const w = canvas.width;
  const mouthY = faceY + faceH * 0.65;
  const mouthH = faceH * 0.15;
  const mouthW = w * 0.4;
  const mouthX = (w - mouthW) / 2;

  let skinPixels = 0;
  let totalPixels = 0;
  let darkPixels = 0; // 可能是嘴巴张开

  for (let y = Math.floor(mouthY); y < Math.floor(mouthY + mouthH); y += 2) {
    for (let x = Math.floor(mouthX); x < Math.floor(mouthX + mouthW); x += 2) {
      const idx = (y * w + x) * 4;
      const r = imageData.data[idx];
      const g = imageData.data[idx + 1];
      const b = imageData.data[idx + 2];

      totalPixels++;
      if (isSkinTone(r, g, b)) {
        skinPixels++;
      }
      // 检测较暗的区域（嘴巴内部）
      if (r < 80 && g < 80 && b < 80) {
        darkPixels++;
      }
    }
  }

  return {
    skinRatio: skinPixels / totalPixels,
    darkRatio: darkPixels / totalPixels
  };
}

// 检测眼睛区域
function detectEyeRegion(imageData, faceY, faceH) {
  const w = canvas.width;
  const eyeY = faceY + faceH * 0.25;
  const eyeH = faceH * 0.12;
  const leftEyeX = w * 0.25;
  const rightEyeX = w * 0.55;
  const eyeW = w * 0.2;

  let leftClosed = 0, rightClosed = 0;
  let totalPixels = 0;

  // 检测左眼
  for (let y = Math.floor(eyeY); y < Math.floor(eyeY + eyeH); y += 2) {
    for (let x = Math.floor(leftEyeX); x < Math.floor(leftEyeX + eyeW); x += 2) {
      const idx = (y * w + x) * 4;
      const r = imageData.data[idx];
      const g = imageData.data[idx + 1];
      const b = imageData.data[idx + 2];
      totalPixels++;
      if (!isSkinTone(r, g, b)) {
        leftClosed++;
      }
    }
  }

  // 检测右眼
  for (let y = Math.floor(eyeY); y < Math.floor(eyeY + eyeH); y += 2) {
    for (let x = Math.floor(rightEyeX); x < Math.floor(rightEyeX + eyeW); x += 2) {
      const idx = (y * w + x) * 4;
      const r = imageData.data[idx];
      const g = imageData.data[idx + 1];
      const b = imageData.data[idx + 2];
      if (!isSkinTone(r, g, b)) {
        rightClosed++;
      }
    }
  }

  return {
    leftClosedRatio: leftClosed / totalPixels,
    rightClosedRatio: rightClosed / totalPixels
  };
}

// 检测眉毛区域（皱眉）
function detectBrowRegion(imageData, faceY, faceH) {
  const w = canvas.width;
  const browY = faceY + faceH * 0.15;
  const browH = faceH * 0.08;
  const leftBrowX = w * 0.25;
  const rightBrowX = w * 0.55;
  const browW = w * 0.2;

  let totalPixels = 0;
  let shadowPixels = 0; // 皱眉时眉毛下方的阴影

  for (let y = Math.floor(browY); y < Math.floor(browY + browH); y += 2) {
    for (let x = Math.floor(leftBrowX); x < Math.floor(leftBrowX + browW); x += 2) {
      const idx = (y * w + x) * 4;
      const r = imageData.data[idx];
      const g = imageData.data[idx + 1];
      const b = imageData.data[idx + 2];
      totalPixels++;
      // 检测眉毛下方的阴影
      if (r < 60 && g < 60 && b < 60) {
        shadowPixels++;
      }
    }
  }

  return shadowPixels / Math.max(totalPixels, 1);
}

// 简化的面部检测 - 基于肤色区域
function detectFaceRegion(imageData) {
  const w = canvas.width;
  const h = canvas.height;

  // 扫描整个图像找肤色集中区域
  let minX = w, maxX = 0, minY = h, maxY = 0;
  let skinCount = 0;

  for (let y = 0; y < h; y += 4) {
    for (let x = 0; x < w; x += 4) {
      const idx = (y * w + x) * 4;
      const r = imageData.data[idx];
      const g = imageData.data[idx + 1];
      const b = imageData.data[idx + 2];

      if (isSkinTone(r, g, b)) {
        skinCount++;
        minX = Math.min(minX, x);
        maxX = Math.max(maxX, x);
        minY = Math.min(minY, y);
        maxY = Math.max(maxY, y);
      }
    }
  }

  if (skinCount < 500) return null; // 人脸太小或不存在

  return {
    x: minX,
    y: minY,
    width: maxX - minX,
    height: maxY - minY
  };
}

// 基于动作检测计算相似度
function calculateSimilarity(faceData) {
  const emotion = EMOTIONS[gameState.currentLevel];
  let similarity = 0;
  let tips = [];

  // 平表情 - 检测面部是否有明显动作
  if (emotion.action === 'none') {
    // 平静表情：嘴巴暗区少，眼睛睁开，眉毛正常
    const mouthDark = mouthHistory.length > 0 ? mouthHistory[mouthHistory.length - 1].darkRatio : 0;
    const eyeClosed = eyeHistory.length > 0 ? (eyeHistory[eyeHistory.length - 1].leftClosedRatio + eyeHistory[eyeHistory.length - 1].rightClosedRatio) / 2 : 0;
    const browShadow = browHistory.length > 0 ? browHistory[browHistory.length - 1] : 0;

    // 平静 = 嘴巴不张 + 眼睛不太闭 + 眉毛不太皱眉
    const mouthScore = 1 - Math.min(mouthDark * 10, 1);
    const eyeScore = 1 - Math.min(eyeClosed * 3, 1);
    const browScore = 1 - Math.min(browShadow * 20, 1);

    similarity = (mouthScore + eyeScore + browScore) / 3;
    if (mouthDark < 0.05 && eyeClosed < 0.3 && browShadow < 0.05) {
      tips.push('保持住！');
    }
  }

  // 微笑 - 检测嘴角上扬和嘴巴张开
  if (emotion.action === 'smile') {
    const mouthData = mouthHistory.length > 0 ? mouthHistory[mouthHistory.length - 1] : { skinRatio: 0, darkRatio: 0 };
    // 微笑时嘴巴上方有更多肤色暴露
    similarity = Math.min(mouthData.skinRatio * 1.5 + mouthData.darkRatio * 3, 1);
    if (similarity > 0.4) tips.push('再笑大一点！');
  }

  // 张嘴 - 检测嘴巴内部暗区
  if (emotion.action === 'open_mouth') {
    const mouthData = mouthHistory.length > 0 ? mouthHistory[mouthHistory.length - 1] : { darkRatio: 0 };
    similarity = Math.min(mouthData.darkRatio * 8, 1);
    if (similarity > 0.3) tips.push('嘴巴张大一点！');
  }

  // 皱眉 - 检测眉毛阴影
  if (emotion.action === 'frown') {
    const browShadow = browHistory.length > 0 ? browHistory[browHistory.length - 1] : 0;
    similarity = Math.min(browShadow * 15, 1);
    if (similarity > 0.3) tips.push('眉头皱紧一点！');
  }

  // 闭眼 - 检测眼睛区域非肤色
  if (emotion.action === 'close_eyes') {
    const eyeData = eyeHistory.length > 0 ? eyeHistory[eyeHistory.length - 1] : { leftClosedRatio: 0, rightClosedRatio: 0 };
    const avgClosed = (eyeData.leftClosedRatio + eyeData.rightClosedRatio) / 2;
    similarity = Math.min(avgClosed * 4, 1);
    if (similarity > 0.4) tips.push('轻轻闭眼！');
  }

  // 惊讶 - 张嘴 + 睁大眼睛
  if (emotion.action === 'surprise') {
    const mouthData = mouthHistory.length > 0 ? mouthHistory[mouthHistory.length - 1] : { darkRatio: 0 };
    const eyeData = eyeHistory.length > 0 ? eyeHistory[eyeHistory.length - 1] : { leftClosedRatio: 0, rightClosedRatio: 0 };
    const avgEyeOpen = 1 - (eyeData.leftClosedRatio + eyeData.rightClosedRatio) / 2;
    const mouthScore = Math.min(mouthData.darkRatio * 8, 1);
    similarity = (avgEyeOpen + mouthScore) / 2;
    if (mouthData.darkRatio > 0.1) tips.push('嘴巴再张大！');
  }

  // 生气 - 皱眉 + 瞪眼
  if (emotion.action === 'angry') {
    const browShadow = browHistory.length > 0 ? browHistory[browHistory.length - 1] : 0;
    const eyeData = eyeHistory.length > 0 ? eyeHistory[eyeHistory.length - 1] : { leftClosedRatio: 0, rightClosedRatio: 0 };
    const avgEyeOpen = 1 - (eyeData.leftClosedRatio + eyeData.rightClosedRatio) / 2;
    const browScore = Math.min(browShadow * 15, 1);
    similarity = (browScore + avgEyeOpen) / 2;
    if (browShadow > 0.05) tips.push('眉头再皱紧一点！');
  }

  if (tips.length > 0 && Math.random() < 0.05) {
    showActionTip(tips[0]);
  }

  return similarity;
}

// 主检测循环
function detect() {
  if (!video || !canvas) {
    requestAnimationFrame(detect);
    return;
  }

  ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // 检测人脸区域
  const face = detectFaceRegion(imageData);

  if (face && isPlaying) {
    // 收集各部位数据
    const mouthData = detectMouthRegion(imageData, face.y, face.height);
    const eyeData = detectEyeRegion(imageData, face.y, face.height);
    const browData = detectBrowRegion(imageData, face.y, face.height);

    // 更新历史记录（滑动窗口）
    mouthHistory.push(mouthData);
    eyeHistory.push(eyeData);
    browHistory.push(browData);
    if (mouthHistory.length > 10) mouthHistory.shift();
    if (eyeHistory.length > 10) eyeHistory.shift();
    if (browHistory.length > 10) browHistory.shift();

    // 计算相似度
    const similarity = calculateSimilarity(face);
    const percent = Math.round(similarity * 100);

    const valueEl = document.getElementById('similarity-value');
    valueEl.textContent = percent + '%';

    if (percent >= 90) {
      valueEl.className = 'similarity-high';
    } else if (percent >= 70) {
      valueEl.className = 'similarity-mid';
    } else {
      valueEl.className = 'similarity-low';
    }

    if (similarity >= PASS_THRESHOLD) {
      passLevel();
    }
  } else if (!face && isPlaying) {
    document.getElementById('similarity-value').textContent = '请对准摄像头';
    document.getElementById('similarity-value').className = 'similarity-low';
  }

  requestAnimationFrame(detect);
}

// 事件绑定
document.getElementById('start-btn').addEventListener('click', async () => {
  if (video && video.srcObject) {
    showLevelSelect();
    return;
  }
  if (await initCamera()) {
    showLevelSelect();
    detect();
  }
});

document.getElementById('level-select-btn').addEventListener('click', () => {
  renderLevelGrid();
  showScreen('level-select');
});

document.getElementById('back-btn').addEventListener('click', () => {
  if (isPlaying) {
    if (confirm('确定要退出当前关卡吗？')) {
      isPlaying = false;
      clearInterval(timerInterval);
      showLevelSelect();
    }
  } else {
    showLevelSelect();
  }
});

document.getElementById('back-from-levels').addEventListener('click', () => {
  showScreen('start-screen');
});

// 初始化
video = document.getElementById('video');
canvas = document.getElementById('canvas');
ctx = canvas.getContext('2d');

loadProgress();
renderLevelGrid();
</script>
