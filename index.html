<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>表情大挑战</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
  }
  .screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  }
  .screen.hidden { display: none; }

  h1 { font-size: 32px; color: #ffd700; margin-bottom: 30px; text-align: center; }
  h2 { font-size: 24px; color: #ffd700; margin-bottom: 20px; text-align: center; }

  /* 开始页面 */
  #start-screen .subtitle {
    color: #aaa;
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.8;
    padding: 0 30px;
  }
  .btn {
    padding: 15px 50px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    background: linear-gradient(135deg, #00ff88, #00d4ff);
    color: #1a1a2e;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
    margin: 10px;
  }
  .btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,255,136,0.4); }
  .btn.secondary {
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: 2px solid rgba(255,255,255,0.3);
  }

  /* 关卡选择 */
  #level-select { padding: 20px; }
  .level-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 15px;
    padding: 20px;
    max-width: 400px;
    width: 100%;
  }
  .level-btn {
    aspect-ratio: 1;
    border-radius: 15px;
    border: 3px solid transparent;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .level-btn .level-num { font-size: 24px; }
  .level-btn .level-status { font-size: 12px; margin-top: 5px; }
  .level-btn.unlocked {
    background: rgba(0,255,136,0.2);
    border-color: #00ff88;
    color: #00ff88;
  }
  .level-btn.unlocked:hover { transform: scale(1.1); background: rgba(0,255,136,0.3); }
  .level-btn.locked {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.4);
    cursor: not-allowed;
  }
  .level-btn.cleared {
    background: rgba(255,215,0,0.2);
    border-color: #ffd700;
    color: #ffd700;
  }
  .level-btn.cleared:hover { transform: scale(1.1); background: rgba(255,215,0,0.3); }

  /* 游戏页面 */
  #game-screen {
    justify-content: flex-start;
    padding-top: 20px;
    overflow-y: auto;
  }
  #status-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 400px;
    padding: 12px 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    font-size: 16px;
    margin-bottom: 10px;
  }
  #timer { font-size: 20px; font-weight: bold; }
  .warning { color: #ff4757 !important; animation: pulse 0.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  #target-emotion {
    font-size: 28px;
    font-weight: bold;
    color: #00ff88;
    text-align: center;
    padding: 15px;
    background: rgba(0,255,136,0.1);
    border-radius: 10px;
    width: 100%;
    max-width: 400px;
    margin-bottom: 10px;
  }
  #target-emotion .hint { font-size: 14px; color: #aaa; margin-top: 8px; }

  #video-container {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    margin-bottom: 15px;
  }
  #video { display: block; transform: scaleX(-1); }
  #overlay { position: absolute; top: 0; left: 0; pointer-events: none; }

  #similarity-display {
    text-align: center;
    margin-bottom: 15px;
  }
  #similarity-value {
    font-size: 56px;
    font-weight: bold;
    transition: color 0.2s;
  }
  #similarity-label { font-size: 14px; color: #aaa; }
  .similarity-low { color: #ff4757; }
  .similarity-mid { color: #ffd700; }
  .similarity-high { color: #00ff88; }

  /* 结果弹框 */
  #modal {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
  }
  #modal.hidden { display: none; }
  #modal-content {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border-radius: 20px;
    padding: 30px 40px;
    text-align: center;
    max-width: 320px;
    width: 90%;
  }
  #modal-content h3 {
    font-size: 24px;
    margin-bottom: 10px;
  }
  #modal-content p { color: #aaa; margin-bottom: 25px; }
  #modal-content .btn-group { display: flex; flex-direction: column; gap: 10px; }

  /* 全部通关 */
  #game-complete h3 { font-size: 28px; color: #ffd700; margin-bottom: 10px; }
  #game-complete .score { font-size: 48px; color: #ffd700; margin: 15px 0; }
  #game-complete .stats { color: #aaa; margin-bottom: 25px; }

  /* 加载中 */
  #loading {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 18px;
    background: rgba(0,0,0,0.9);
    padding: 25px 40px;
    border-radius: 15px;
    z-index: 300;
  }

  .back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    padding: 10px 20px;
    font-size: 14px;
    background: rgba(255,255,255,0.1);
    color: #fff;
    border: none;
    border-radius: 20px;
    cursor: pointer;
    z-index: 50;
  }

  #score-display { color: #ffd700; }
</style>
</head>
<body>

<!-- 加载中 -->
<div id="loading" class="hidden">正在加载模型...</div>

<!-- 开始页面 -->
<div id="start-screen" class="screen">
  <h1>表情大挑战</h1>
  <p class="subtitle">
    根据提示做出相应的表情<br>
    相似度达到90%即可过关<br>
    每关限时30秒<br>
    共7个关卡等你挑战
  </p>
  <button class="btn" id="start-btn">开始挑战</button>
  <button class="btn secondary" id="level-select-btn">选择关卡</button>
</div>

<!-- 关卡选择 -->
<div id="level-select" class="screen hidden">
  <button class="back-btn" id="back-from-levels">返回</button>
  <h2>选择关卡</h2>
  <div class="level-grid" id="level-grid"></div>
</div>

<!-- 游戏页面 -->
<div id="game-screen" class="screen hidden">
  <button class="back-btn" id="back-btn">返回</button>

  <div id="status-bar">
    <span>关卡 <span id="level-num">1</span>/7</span>
    <span id="timer">30s</span>
    <span>总分: <span id="score-display">0</span></span>
  </div>

  <div id="target-emotion">
    <div id="emotion-text">平静</div>
    <div class="hint" id="emotion-hint">保持自然放松的表情</div>
  </div>

  <div id="video-container">
    <video id="video" width="320" height="320" autoplay playsinline></video>
    <canvas id="overlay" width="320" height="320"></canvas>
  </div>

  <div id="similarity-display">
    <div id="similarity-value" class="similarity-low">0%</div>
    <div id="similarity-label">与目标表情的相似度</div>
  </div>
</div>

<!-- 结果弹框 -->
<div id="modal" class="hidden">
  <div id="modal-content">
    <h3 id="modal-title">恭喜过关！</h3>
    <p id="modal-text">+150分</p>
    <div class="btn-group" id="modal-buttons"></div>
  </div>
</div>

<script src="https://unpkg.com/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script>
const EMOTIONS = [
  { name: '平静', key: 'neutral', hint: '保持自然放松的表情' },
  { name: '开心', key: 'happy', hint: '露出自然的笑容' },
  { name: '惊讶', key: 'surprised', hint: '眉毛上扬，嘴巴张开' },
  { name: '悲伤', key: 'sad', hint: '嘴角向下，眉头微微皱起' },
  { name: '生气', key: 'angry', hint: '眉头下压，嘴唇抿紧' },
  { name: '害怕', key: 'fearful', hint: '眼睛睁大，眉毛上扬' },
  { name: '厌恶', key: 'disgusted', hint: '皱起鼻子，嘴角下拉' }
];

const PASS_THRESHOLD = 0.9;
const TIME_LIMIT = 30;
const STORAGE_KEY = 'emotion_game_progress';

let gameState = {
  currentLevel: 0,
  totalScore: 0,
  levels: {} // { levelIndex: { cleared: true, bestScore: 0 } }
};

let isPlaying = false;
let timer = TIME_LIMIT;
let timerInterval = null;
let video = null;
let canvas = null;

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      gameState.levels = parsed.levels || {};
      gameState.totalScore = parsed.totalScore || 0;
    }
  } catch (e) {
    console.error('Failed to load progress:', e);
  }
}

function saveProgress() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      levels: gameState.levels,
      totalScore: gameState.totalScore
    }));
  } catch (e) {
    console.error('Failed to save progress:', e);
  }
}

function isLevelUnlocked(levelIndex) {
  if (levelIndex === 0) return true;
  return gameState.levels[levelIndex - 1]?.cleared === true;
}

function renderLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';

  EMOTIONS.forEach((emotion, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-btn';
    const unlocked = isLevelUnlocked(i);
    const cleared = gameState.levels[i]?.cleared;

    if (cleared) {
      btn.classList.add('cleared');
      btn.innerHTML = `<span class="level-num">${i + 1}</span><span class="level-status">已通过</span>`;
    } else if (unlocked) {
      btn.classList.add('unlocked');
      btn.innerHTML = `<span class="level-num">${i + 1}</span><span class="level-status">${emotion.name}</span>`;
    } else {
      btn.classList.add('locked');
      btn.innerHTML = `<span class="level-num">🔒</span><span class="level-status">未解锁</span>`;
    }

    if (unlocked) {
      btn.addEventListener('click', () => startLevel(i));
    }

    grid.appendChild(btn);
  });
}

function showScreen(screenId) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(screenId).classList.remove('hidden');
}

function startLevel(levelIndex) {
  gameState.currentLevel = levelIndex;
  isPlaying = true;
  timer = TIME_LIMIT;

  const emotion = EMOTIONS[levelIndex];

  document.getElementById('level-num').textContent = levelIndex + 1;
  document.getElementById('emotion-text').textContent = emotion.name;
  document.getElementById('emotion-hint').textContent = emotion.hint;
  document.getElementById('score-display').textContent = gameState.totalScore;
  document.getElementById('similarity-value').textContent = '0%';
  document.getElementById('similarity-value').className = 'similarity-low';

  updateTimer();
  showScreen('game-screen');

  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timer--;
    updateTimer();
    if (timer <= 0) {
      clearInterval(timerInterval);
      failLevel();
    }
  }, 1000);
}

function updateTimer() {
  const timerEl = document.getElementById('timer');
  timerEl.textContent = timer + 's';
  if (timer <= 5) {
    timerEl.classList.add('warning');
  } else {
    timerEl.classList.remove('warning');
  }
}

function passLevel() {
  isPlaying = false;
  clearInterval(timerInterval);

  const points = timer * 10;
  gameState.totalScore += points;
  gameState.levels[gameState.currentLevel] = {
    cleared: true,
    bestScore: Math.max(gameState.levels[gameState.currentLevel]?.bestScore || 0, points)
  };
  saveProgress();

  if (gameState.currentLevel === EMOTIONS.length - 1) {
    showGameComplete();
  } else {
    showModal({
      title: '🎉 恭喜过关！',
      text: `+${points}分，下一关：${EMOTIONS[gameState.currentLevel + 1].name}`,
      buttons: [
        { text: '下一关', action: () => { hideModal(); startLevel(gameState.currentLevel + 1); } }
      ]
    });
  }
}

function failLevel() {
  isPlaying = false;
  const currentSimilarity = Math.round(getCurrentSimilarity() * 100);

  showModal({
    title: '😢 时间到！',
    text: `相似度 ${currentSimilarity}%，未达到90%`,
    buttons: [
      { text: '重新挑战', action: () => { hideModal(); startLevel(gameState.currentLevel); }, primary: true },
      { text: '返回关卡', action: () => { hideModal(); showLevelSelect(); }, secondary: true }
    ]
  });
}

function showGameComplete() {
  showModal({
    title: '🏆 全部通关！',
    text: `总分：${gameState.totalScore}分`,
    buttons: [
      { text: '再玩一次', action: () => { hideModal(); showLevelSelect(); }, primary: true },
      { text: '返回首页', action: () => { hideModal(); showScreen('start-screen'); } }
    ]
  });
}

function showLevelSelect() {
  renderLevelGrid();
  showScreen('level-select');
}

function showModal({ title, text, buttons }) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-text').textContent = text;

  const btnGroup = document.getElementById('modal-buttons');
  btnGroup.innerHTML = '';

  buttons.forEach(btn => {
    const button = document.createElement('button');
    button.className = btn.primary ? 'btn' : 'btn secondary';
    button.textContent = btn.text;
    button.addEventListener('click', btn.action);
    btnGroup.appendChild(button);
  });

  document.getElementById('modal').classList.remove('hidden');
}

function hideModal() {
  document.getElementById('modal').classList.add('hidden');
}

function getCurrentSimilarity() {
  const el = document.getElementById('similarity-value');
  return parseInt(el.textContent) / 100;
}

async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: 320, height: 320 }
    });
    video.srcObject = stream;
    await new Promise(resolve => video.onloadedmetadata = resolve);
    return true;
  } catch (err) {
    alert('无法访问摄像头，请确保已授权摄像头权限');
    return false;
  }
}

async function loadModels() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('loading').textContent = '加载检测模型...';
  try {
    await faceapi.nets.tinyFaceDetector.loadFromUri(
      'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights/tiny_face_detector_model-weights_manifest.json'
    );
    document.getElementById('loading').textContent = '加载表情模型...';
    await faceapi.nets.faceExpressionNet.loadFromUri(
      'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights/face_expression_model-weights_manifest.json'
    );
  } catch (err) {
    console.error('Model load error:', err);
    document.getElementById('loading').textContent = '模型加载失败，请刷新重试';
    return;
  }
  document.getElementById('loading').classList.add('hidden');
}

let lastDetectionTime = 0;
const DETECTION_INTERVAL = 100;

async function detectEmotion() {
  if (!video || !isPlaying) {
    requestAnimationFrame(detectEmotion);
    return;
  }

  const now = Date.now();
  if (now - lastDetectionTime < DETECTION_INTERVAL) {
    requestAnimationFrame(detectEmotion);
    return;
  }
  lastDetectionTime = now;

  try {
    const detections = await faceapi
      .detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceExpressions();

    const ctx = canvas;
    ctx.clearRect(0, 0, 320, 320);

    if (detections.length > 0) {
      const expressions = detections[0].expressions;
      const targetKey = EMOTIONS[gameState.currentLevel].key;
      const similarity = expressions[targetKey] || 0;

      const percent = Math.round(similarity * 100);
      const valueEl = document.getElementById('similarity-value');
      valueEl.textContent = percent + '%';

      if (percent >= 90) {
        valueEl.className = 'similarity-high';
      } else if (percent >= 70) {
        valueEl.className = 'similarity-mid';
      } else {
        valueEl.className = 'similarity-low';
      }

      if (isPlaying && similarity >= PASS_THRESHOLD) {
        passLevel();
      }
    } else {
      document.getElementById('similarity-value').textContent = '未检测到人脸';
      document.getElementById('similarity-value').className = 'similarity-low';
    }
  } catch (e) {
    console.error('Detection error:', e);
  }

  requestAnimationFrame(detectEmotion);
}

document.getElementById('start-btn').addEventListener('click', async () => {
  if (video.srcObject) {
    showLevelSelect();
    return;
  }
  if (await initCamera()) {
    await loadModels();
    showLevelSelect();
    detectEmotion();
  }
});

document.getElementById('level-select-btn').addEventListener('click', () => {
  renderLevelGrid();
  showScreen('level-select');
});

document.getElementById('back-btn').addEventListener('click', () => {
  if (isPlaying) {
    if (confirm('确定要退出当前关卡吗？')) {
      isPlaying = false;
      clearInterval(timerInterval);
      showLevelSelect();
    }
  } else {
    showLevelSelect();
  }
});

document.getElementById('back-from-levels').addEventListener('click', () => {
  showScreen('start-screen');
});

video = document.getElementById('video');
canvas = document.getElementById('overlay').getContext('2d');

loadProgress();
renderLevelGrid();
</script>
</body>
</html>
